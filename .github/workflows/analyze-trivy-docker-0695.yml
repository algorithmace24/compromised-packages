name: Analyze Trivy Docker Image v0.69.5

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze-trivy-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Pull trivy v0.69.5 from Docker Hub
        run: docker pull aquasec/trivy:0.69.5

      - name: Extract trivy binary from Docker image
        run: |
          docker run --rm --entrypoint cat aquasec/trivy:0.69.5 /usr/local/bin/trivy > trivy
          chmod +x trivy
          echo "=== SHA256 ==="
          sha256sum trivy
          echo "=== Version ==="
          ./trivy --version

      - name: Search for C2 domain in binary
        run: |
          strings trivy | grep -i "aquasecurtiy" || echo "No match found"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run trivy filesystem scan
        run: ./trivy fs .

      - name: Pull Docker image
        run: docker pull nginx:latest

      - name: Run trivy image scan
        run: ./trivy image nginx:latest
