name: Analyze Trivy Docker Image v0.69.6

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze-trivy-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Pull trivy v0.69.6 from Docker Hub
        run: docker pull aquasec/trivy:0.69.6

      - name: Run trivy version
        run: docker run --rm aquasec/trivy:0.69.6 --version

      - name: Run trivy filesystem scan
        uses: actions/checkout@v4

      - name: Run trivy fs scan via Docker
        run: docker run --rm -v "$PWD:/workspace" aquasec/trivy:0.69.6 fs /workspace

      - name: Pull test image
        run: docker pull nginx:latest

      - name: Run trivy image scan via Docker
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.69.6 image nginx:latest
